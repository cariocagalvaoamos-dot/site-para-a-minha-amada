<h1>TE VEJO EM TUDO QUE ME FAZ BEM!!!</h1>

<p>

As músicas mais lindas,<br>
me lembram você.

<br><br>

Como se cada melodia,<br>
soubesse onde mora meu querer.

<br><br>

Minhas flores preferidas,<br>
já não me pertencem.

<br><br>

Porque tudo que é belo demais,<br>
sempre encontra um jeito de chegar em você.

</p>
